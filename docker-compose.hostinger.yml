# Hostinger deploy bundle compose file.
#
# This file is staged by infra/hostinger/deploy.sh to:
#   /docker/transmuter/docker-compose.yml
#
# The staged bundle intentionally contains only the repo subsets required to
# build and run the Hostinger stack; it is not a full repository checkout.

name: ${TRANSMUTER_COMPOSE_PROJECT:-transmuter-hostinger}

x-api-environment: &api-environment
  APP_NAME: ${APP_NAME:-Transmuter API}
  VERSION: ${VERSION:-0.1.0}
  DEBUG: "false"
  ENVIRONMENT: ${TRANSMUTER_ENVIRONMENT:-production}
  APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://transmuter.ishirock.tech}
  SUPABASE_TARGET: ${SUPABASE_TARGET:-local}
  SUPABASE_URL: ${SUPABASE_URL:-}
  SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-}
  SUPABASE_CLOUD_URL: ${SUPABASE_CLOUD_URL:-}
  SUPABASE_CLOUD_ANON_KEY: ${SUPABASE_CLOUD_ANON_KEY:-}
  SUPABASE_CLOUD_SERVICE_KEY: ${SUPABASE_CLOUD_SERVICE_KEY:-}
  SUPABASE_LOCAL_URL: ${SUPABASE_LOCAL_URL:-}
  SUPABASE_LOCAL_ANON_KEY: ${SUPABASE_LOCAL_ANON_KEY:-}
  SUPABASE_LOCAL_SERVICE_KEY: ${SUPABASE_LOCAL_SERVICE_KEY:-}
  SUPABASE_SCHEMA: ${SUPABASE_SCHEMA:-}
  DATABASE_URL: ${DATABASE_URL:-}
  DATABASE_CLOUD_URL: ${DATABASE_CLOUD_URL:-}
  DATABASE_LOCAL_URL: ${DATABASE_LOCAL_URL:-}
  DB_SCHEMA: ${DB_SCHEMA:-}
  JWT_SECRET: ${JWT_SECRET}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-60}
  AI_ENABLED: ${AI_ENABLED:-true}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  DEFAULT_MODEL: ${DEFAULT_MODEL:-anthropic/claude-sonnet-4-6}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
  LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
  LOGFIRE_TOKEN: ${LOGFIRE_TOKEN:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
  ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
  RESEND_API_KEY: ${RESEND_API_KEY:-}
  RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-}
  MICROSOFT_GRAPH_CLIENT_ID: ${MICROSOFT_GRAPH_CLIENT_ID:-}
  MICROSOFT_GRAPH_CLIENT_SECRET: ${MICROSOFT_GRAPH_CLIENT_SECRET:-}
  MICROSOFT_GRAPH_TENANT_ID: ${MICROSOFT_GRAPH_TENANT_ID:-common}
  MICROSOFT_GRAPH_REDIRECT_URI: ${MICROSOFT_GRAPH_REDIRECT_URI:-}
  MICROSOFT_GRAPH_SCOPES: ${MICROSOFT_GRAPH_SCOPES:-offline_access User.Read Calendars.ReadWrite OnlineMeetings.Read OnlineMeetingTranscript.Read.All}
  PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-stripe}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
  STRIPE_PRICE_TEAM_MONTHLY: ${STRIPE_PRICE_TEAM_MONTHLY:-}
  STRIPE_PRICE_TEAM_ANNUAL: ${STRIPE_PRICE_TEAM_ANNUAL:-}
  STRIPE_PRICE_BUSINESS_MONTHLY: ${STRIPE_PRICE_BUSINESS_MONTHLY:-}
  STRIPE_PRICE_BUSINESS_ANNUAL: ${STRIPE_PRICE_BUSINESS_ANNUAL:-}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
  PLATFORM_ADMIN_EMAILS: ${PLATFORM_ADMIN_EMAILS:-}

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    image: ${TRANSMUTER_API_IMAGE:-transmuter-api:hostinger}
    environment:
      <<: *api-environment
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
      - supabase
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    image: ${TRANSMUTER_API_IMAGE:-transmuter-api:hostinger}
    profiles:
      - worker
    environment:
      <<: *api-environment
    command: ["uv", "run", "python", "-m", "procrastinate", "--app=app.jobs.status_nudges.app", "worker"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app
      - supabase
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    image: ${TRANSMUTER_WEB_IMAGE:-transmuter-web:hostinger}
    environment:
      TRANSMUTER_API_URL: ${TRANSMUTER_API_URL:-/api}
      TRANSMUTER_ENVIRONMENT: ${TRANSMUTER_ENVIRONMENT:-production}
      TRANSMUTER_SENTRY_DSN: ${TRANSMUTER_SENTRY_DSN:-}
    ports:
      - "${TRANSMUTER_WEB_BIND:-127.0.0.1:4301}:80"
    networks:
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-transmuter-web}.rule=Host(`${TRAEFIK_HOSTNAME:-transmuter.ishirock.tech}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-transmuter-web}.entrypoints=${TRAEFIK_HTTPS_ENTRYPOINT:-websecure}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-transmuter-web}.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME:-transmuter-web}.service=${TRAEFIK_SERVICE_NAME:-transmuter-web}"
      - "traefik.http.services.${TRAEFIK_SERVICE_NAME:-transmuter-web}.loadbalancer.server.port=80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

networks:
  app:
    driver: bridge
  supabase:
    external: true
    name: supabase-aethos_default
