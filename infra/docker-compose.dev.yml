services:

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_TARGET=${SUPABASE_TARGET:-cloud}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_CLOUD_URL=${SUPABASE_CLOUD_URL}
      - SUPABASE_CLOUD_ANON_KEY=${SUPABASE_CLOUD_ANON_KEY}
      - SUPABASE_CLOUD_SERVICE_KEY=${SUPABASE_CLOUD_SERVICE_KEY}
      - SUPABASE_LOCAL_URL=${SUPABASE_LOCAL_URL}
      - SUPABASE_LOCAL_ANON_KEY=${SUPABASE_LOCAL_ANON_KEY}
      - SUPABASE_LOCAL_SERVICE_KEY=${SUPABASE_LOCAL_SERVICE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_CLOUD_URL=${DATABASE_CLOUD_URL}
      - DATABASE_LOCAL_URL=${DATABASE_LOCAL_URL}
      - PLATFORM_ADMIN_EMAILS=${PLATFORM_ADMIN_EMAILS:-}
      - PLATFORM_ADMIN_BOOTSTRAP_ENABLED=${PLATFORM_ADMIN_BOOTSTRAP_ENABLED:-true}
      - PLATFORM_ADMIN_BOOTSTRAP_EMAIL=${PLATFORM_ADMIN_BOOTSTRAP_EMAIL:-}
      - PLATFORM_ADMIN_BOOTSTRAP_PASSWORD=${PLATFORM_ADMIN_BOOTSTRAP_PASSWORD:-}
      - DEBUG=true
      - AI_ENABLED=${AI_ENABLED:-true}
    volumes:
      - ../apps/api/app:/app/app   # hot-reload in dev
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - worker

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      - SUPABASE_TARGET=${SUPABASE_TARGET:-cloud}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_CLOUD_URL=${DATABASE_CLOUD_URL}
      - DATABASE_LOCAL_URL=${DATABASE_LOCAL_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_CLOUD_URL=${SUPABASE_CLOUD_URL}
      - SUPABASE_CLOUD_ANON_KEY=${SUPABASE_CLOUD_ANON_KEY}
      - SUPABASE_CLOUD_SERVICE_KEY=${SUPABASE_CLOUD_SERVICE_KEY}
      - SUPABASE_LOCAL_URL=${SUPABASE_LOCAL_URL}
      - SUPABASE_LOCAL_ANON_KEY=${SUPABASE_LOCAL_ANON_KEY}
      - SUPABASE_LOCAL_SERVICE_KEY=${SUPABASE_LOCAL_SERVICE_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    command: python -m procrastinate --app=app.jobs.status_nudges.app worker
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "4300:4300"
    volumes:
      - ../apps/web:/app
      - /app/node_modules
    command: npm run start -- --host 0.0.0.0 --port 4300
    environment:
      - NODE_ENV=development
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4300"]
      interval: 15s
      timeout: 5s
      retries: 5
