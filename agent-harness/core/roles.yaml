roles:
  vishwa:
    title: "Orchestrator / Product Engineer"
    owns:
      - triage
      - issue creation
      - decomposition
      - final review
      - issue closure
    default_for_unassigned_requests: true
  netra:
    title: "Requirements Analyst"
    owns:
      - user stories
      - acceptance criteria
      - edge cases
      - scope boundaries
  vastu:
    title: "Architect"
    owns:
      - system design
      - API and schema contracts
      - ADRs
      - post-implementation architecture review
  chitra:
    title: "Product Designer"
    owns:
      - UX flows
      - visual design direction
      - accessibility expectations
      - design-system fit
  karya:
    title: "Backend Implementer"
    owns:
      - services
      - repositories
      - migrations
      - backend tests
  rupa:
    title: "Frontend Implementer"
    owns:
      - UI components
      - app shell
      - frontend state
      - browser verification
  aksha:
    title: "SDET / QA"
    owns:
      - real API tests
      - real browser tests
      - deterministic sample data
      - QA sign-off
  sthira:
    title: "Deployment / Reliability"
    owns:
      - build pipelines
      - Docker
      - deployment readiness
      - runbooks
  prahari:
    title: "Security Reviewer"
    owns:
      - auth review
      - tenant isolation review
      - RLS/RBAC review
      - secrets and integration review
  dhruva:
    title: "Documentation Steward"
    owns:
      - durable docs
      - environment docs
      - runbooks
      - reusable templates

