domain_pack: transmuter
version: "1.1.0"

# Stage gate criteria for Transmuter initiatives.
#
# Design: ALL criteria are MANUAL (human-reviewed checklists).
# Admins can add/edit/remove criteria per gate via the Admin UI or by editing this file.
# No programmatic auto-validation — the governance reviewer ticks each item.
#
# To add a custom criterion: copy any entry below and set configurable: true.
# The application loads these as the DEFAULT template; tenants can override per their org.

configurable: true   # Admin UI can add/edit/remove criteria per tenant

gates:

  G1:
    label: "G1 — Move to In-Progress"
    description: >
      Initiative meets readiness criteria to begin execution.
      All items must be ticked by a Transformation Office reviewer before the stage advances.
    from_stage: scoping
    to_stage: in_progress
    criteria:

      - id: g1-01
        label: "Owner assigned"
        guidance: "An initiative owner is named and has accepted ownership."
        configurable: true
        default: true

      - id: g1-02
        label: "Executive summary documented"
        guidance: "A clear, concise description of what the initiative is and why it matters."
        configurable: true
        default: true

      - id: g1-03
        label: "Value logic documented"
        guidance: "The financial or strategic rationale is written out (how value will be created or cost avoided)."
        configurable: true
        default: true

      - id: g1-04
        label: "At least one milestone defined"
        guidance: "The initiative has a concrete first milestone with an owner and a due date."
        configurable: true
        default: true

      - id: g1-05
        label: "Planned end date set"
        guidance: "A realistic target completion date has been entered."
        configurable: true
        default: true

      - id: g1-06
        label: "At least one KPI defined"
        guidance: "A measurable success indicator is in place (operational or financial KPI)."
        configurable: true
        default: true

      - id: g1-07
        label: "Financial baseline entered"
        guidance: "Base case revenue uplift or cost estimate has been entered in the Financials tab."
        configurable: true
        default: true

      - id: g1-08
        label: "Workstream assigned"
        guidance: "The initiative is linked to the correct workstream for reporting and governance."
        configurable: true
        default: true

      - id: g1-09
        label: "Dependencies identified"
        guidance: "Known cross-initiative or external dependencies have been documented in the dependency network (or explicitly noted as none)."
        configurable: true
        default: true

      - id: g1-11
        label: "Shared-cost applicability reviewed"
        guidance: "Technology, group PMO, vendor, cloud, shared team, or corporate overhead costs have been assessed for allocation."
        configurable: true
        default: true

      - id: g1-10
        label: "Risks reviewed"
        guidance: "At least an initial risk scan has been done; major risks are captured in the Risk register."
        configurable: true
        default: true

  G2:
    label: "G2 — Move to Complete"
    description: >
      Initiative has delivered its intended value and is ready to close.
      All items must be ticked by a Transformation Office reviewer before the stage advances.
    from_stage: in_progress
    to_stage: complete
    criteria:

      - id: g2-01
        label: "All milestones complete or formally waived"
        guidance: "Every milestone is marked Complete, or a formal waiver decision has been recorded with commentary."
        configurable: true
        default: true

      - id: g2-02
        label: "Final status update submitted"
        guidance: "A non-draft status update has been submitted for the final reporting period."
        configurable: true
        default: true

      - id: g2-03
        label: "Financial actuals entered"
        guidance: "Actual financial outcomes (revenue, costs) are recorded in the Financials tab."
        configurable: true
        default: true

      - id: g2-04
        label: "KPI actuals entered for final period"
        guidance: "Actuals for the final reporting period are entered for all KPIs."
        configurable: true
        default: true

      - id: g2-05
        label: "Final summary and lessons learned documented"
        guidance: "The Summary & Results tab has a final summary and at least one lessons learned entry."
        configurable: true
        default: true

      - id: g2-06
        label: "All high-rated risks closed or mitigated"
        guidance: "No open high-rated risks remain without a documented mitigation or closure reason."
        configurable: true
        default: true

      - id: g2-07
        label: "Value realised vs. planned reviewed"
        guidance: "Planned value vs. actual value has been reviewed and the delta explained."
        configurable: true
        default: true

      - id: g2-09
        label: "Allocation reconciliation complete"
        guidance: "Allocated shared costs are reconciled against direct initiative costs and the final burdened net value is reviewed."
        configurable: true
        default: true

      - id: g2-08
        label: "Handover / BAU transition plan confirmed"
        guidance: "If ongoing operations are required post-initiative, the receiving team has confirmed readiness."
        configurable: true
        default: false   # off by default — enable for relevant initiative types
