apiVersion: agentic/v1
kind: SkillSpec
metadata:
  name: meeting_decisions_extraction
  version: 0.1.0
  owner_agent: netra
  description: Extract meeting decisions and linked initiative status update signals.
contract:
  input_schema:
    type: object
    required:
      - chunks
    properties:
      chunks:
        type: array
        items:
          type: object
      linked_initiatives:
        type: array
        items:
          type: object
  output_schema:
    type: object
    required:
      - decisions
      - initiative_updates
    properties:
      decisions:
        type: array
        items:
          type: object
      initiative_updates:
        type: array
        items:
          type: object
behavior:
  deterministic: true
  idempotent: true
  side_effects:
    - none
  retries:
    max: 0
    backoff: none
  timeout_ms: 1000
security:
  scopes_required:
    - meetings:read
    - initiatives:read
  pii_sensitivity: medium
  audit_required: true
telemetry:
  trace_provider: langfuse
  metric_name: meeting_decisions_extraction
implementation:
  handler: apps/api/app/agents/meeting_notes_agent.py::extract_meeting_decisions
  fallback: Deterministic decision phrase extraction with human review.
