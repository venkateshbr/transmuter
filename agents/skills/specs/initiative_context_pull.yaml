apiVersion: agentic/v1
kind: SkillSpec
metadata:
  name: initiative_context_pull
  version: 0.1.0
  owner_agent: dhruva
  description: Pull non-PII initiative operating context for AI drafting and RAG skills.
contract:
  input_schema:
    type: object
    required:
      - initiative_id
    properties:
      initiative_id:
        type: string
        format: uuid
      period_start:
        type:
          - string
          - "null"
        format: date
      period_end:
        type:
          - string
          - "null"
        format: date
  output_schema:
    type: object
    required:
      - milestones_summary
      - kpis_summary
      - risks_summary
      - financials_summary
    properties:
      milestones_summary:
        type: object
      kpis_summary:
        type: object
      risks_summary:
        type: object
      financials_summary:
        type: object
      last_update:
        type:
          - object
          - "null"
behavior:
  deterministic: true
  idempotent: true
  side_effects:
    - none
  retries:
    max: 0
    backoff: none
  timeout_ms: 1500
security:
  scopes_required:
    - initiatives:read
  pii_sensitivity: low
  audit_required: true
telemetry:
  trace_provider: langfuse
  metric_name: initiative_context_pull
implementation:
  handler: apps/api/app/services/initiative_context.py::InitiativeContextService.get_context
  fallback: Return partial context with unavailable sections marked empty.
